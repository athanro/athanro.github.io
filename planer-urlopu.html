<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Planner Urlopu</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .header h1 {
            margin: 0;
            font-size: 22px;
        }

        .year-nav {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .year-nav button {
            font-size: 18px;
            cursor: pointer;
            border: 1px solid #aaa;
            background: #f5f5f5;
            padding: 2px 10px;
            border-radius: 4px;
        }

        .year-nav button:hover {
            background: #e0e0e0;
        }

        #year-label {
            font-size: 18px;
            font-weight: bold;
            min-width: 50px;
            text-align: center;
        }

        .stats {
            margin-bottom: 10px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
        }

        .stats span {
            white-space: nowrap;
        }

        #copy-btn {
            padding: 4px 14px;
            font-size: 13px;
            cursor: pointer;
            border: 1px solid #aaa;
            background: #f5f5f5;
            border-radius: 4px;
        }

        #copy-btn:hover {
            background: #e0e0e0;
        }

        #copy-msg {
            font-size: 13px;
            color: green;
            display: none;
        }

        .month {
            display: flex;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .month-name {
            width: 100px;
            font-weight: bold;
            flex-shrink: 0;
            padding-top: 22px;
        }

        .month-grid {
            display: flex;
            flex-direction: column;
        }

        .weekdays-row, .days-row {
            display: flex;
            flex-wrap: nowrap;
        }

        .weekday-cell {
            width: 36px;
            height: 25px;
            font-size: 11px;
            font-weight: bold;
            color: #000068;
            text-align: center;
            line-height: 25px;
            flex-shrink: 0;
        }

        .cell {
            width: 36px;
            height: 36px;
            border: 1px solid #ddd;
            font-size: 12px;
            text-align: center;
            line-height: 36px;
            user-select: none;
            flex-shrink: 0;
            box-sizing: border-box;
        }

        .weekend {
            background: #eee;
        }

        .holiday {
            background: #ffcccc;
        }

        .selected {
            background: #4caf50;
            color: white;
        }

        .workday {
            cursor: pointer;
        }

        .workday:hover {
            opacity: 0.75;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Planner Urlopu</h1>
    <div class="year-nav">
        <button id="prev-year">&#8592;</button>
        <span id="year-label"></span>
        <button id="next-year">&#8594;</button>
    </div>
</div>

<div class="stats">
    <span>Wybrane dni urlopu: <strong id="count">0</strong></span>
    <span>Lacznie dni wolnych: <strong id="total">0</strong></span>
    <button id="copy-btn">Kopiuj link</button>
    <span id="copy-msg">Skopiowano!</span>
</div>

<div id="calendar"></div>

<script>
    let year = new Date().getFullYear();
    let holidays = {};
    let selectedDays = new Set();

    const calendar = document.getElementById("calendar");
    const countEl = document.getElementById("count");
    const totalEl = document.getElementById("total");
    const yearLabel = document.getElementById("year-label");

    const weekdaysShort = ["Pn", "Wt", "Sr", "Cz", "Pt", "Sb", "Nd"];
    const months = [
        "Styczen", "Luty", "Marzec", "Kwiecien", "Maj", "Czerwiec",
        "Lipiec", "Sierpien", "Wrzesien", "Pazdziernik", "Listopad", "Grudzien"
    ];

    // --- URL encode/decode ---
    // Format: 2026-1-2,5-8,15|2026-3-10-14
    // Groups by year and month: YEAR-MONTH-d,d-d,d
    // Range: d-d (two numbers joined by a hyphen)
    // Single day: d
    // Groups separated by |

    function encodeDays(days) {
        if (days.size === 0) return "";

        // group by year and month
        const map = {};
        for (const iso of days) {
            const [y, m, d] = iso.split("-").map(Number);
            const key = `${y}-${m}`;
            if (!map[key]) map[key] = [];
            map[key].push(d);
        }

        const parts = [];
        for (const key of Object.keys(map).sort()) {
            const [y, m] = key.split("-").map(Number);
            const ds = map[key].sort((a, b) => a - b);

            // build ranges
            const segments = [];
            let start = ds[0], end = ds[0];
            for (let i = 1; i < ds.length; i++) {
                if (ds[i] === end + 1) {
                    end = ds[i];
                } else {
                    segments.push(start === end ? `${start}` : `${start}-${end}`);
                    start = end = ds[i];
                }
            }
            segments.push(start === end ? `${start}` : `${start}-${end}`);

            parts.push(`${y}-${m}-${segments.join(",")}`);
        }

        return parts.join("|");
    }

    function decodeDays(str) {
        const result = new Set();
        if (!str) return result;

        for (const group of str.split("|")) {
            // format: YEAR-MONTH-segments
            const match = group.match(/^(\d{4})-(\d{1,2})-(.+)$/);
            if (!match) continue;
            const y = Number(match[1]);
            const m = Number(match[2]);
            const segments = match[3].split(",");

            for (const seg of segments) {
                const range = seg.match(/^(\d+)-(\d+)$/);
                if (range) {
                    const from = Number(range[1]), to = Number(range[2]);
                    for (let d = from; d <= to; d++) {
                        result.add(isoDate(y, m - 1, d));
                    }
                } else {
                    result.add(isoDate(y, m - 1, Number(seg)));
                }
            }
        }
        return result;
    }

    function buildShareUrl() {
        const encoded = encodeDays(selectedDays);
        const url = new URL(window.location.href.split("?")[0]);
        if (encoded) url.searchParams.set("days", encoded);
        return url.toString();
    }

    document.getElementById("copy-btn").onclick = () => {
        navigator.clipboard.writeText(buildShareUrl()).then(() => {
            const msg = document.getElementById("copy-msg");
            msg.style.display = "inline";
            setTimeout(() => msg.style.display = "none", 2000);
        });
    };

    // --- initialize from URL ---
    function loadFromUrl() {
        const params = new URLSearchParams(window.location.search);
        const daysParam = params.get("days");
        if (daysParam) {
            selectedDays = decodeDays(daysParam);
            // set year to the first selected day
            if (selectedDays.size > 0) {
                const firstIso = [...selectedDays].sort()[0];
                year = Number(firstIso.split("-")[0]);
            }
        }
    }

    // --- year navigation ---
    document.getElementById("prev-year").onclick = () => changeYear(year - 1);
    document.getElementById("next-year").onclick = () => changeYear(year + 1);

    function changeYear(newYear) {
        year = newYear;
        selectedDays = new Set();
        holidays = {};
        yearLabel.textContent = year;
        calendar.innerHTML = "";
        updateStats();
        loadHolidays();
    }

    // --- helpers ---
    function getPolishWeekdayIndex(jsDay) {
        return jsDay === 0 ? 6 : jsDay - 1;
    }

    function isoDate(y, m, d) {
        return `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    }

    function isNonWorking(iso) {
        const d = new Date(iso);
        const dow = d.getDay();
        return dow === 0 || dow === 6 || !!holidays[iso];
    }

    function addDays(iso, n) {
        const d = new Date(iso);
        d.setDate(d.getDate() + n);
        return isoDate(d.getFullYear(), d.getMonth(), d.getDate());
    }

    function calcTotalFreeDays() {
        if (selectedDays.size === 0) return 0;
        const free = new Set(selectedDays);
        let changed = true;
        // expand the set in both directions as long as adjacent days are non-working
        while (changed) {
            changed = false;
            for (const iso of [...free]) {
                const prev = addDays(iso, -1);
                const next = addDays(iso, 1);
                if (isNonWorking(prev) && !free.has(prev)) {
                    free.add(prev);
                    changed = true;
                }
                if (isNonWorking(next) && !free.has(next)) {
                    free.add(next);
                    changed = true;
                }
            }
        }
        return free.size;
    }

    function updateStats() {
        countEl.textContent = selectedDays.size;
        totalEl.textContent = calcTotalFreeDays();
    }

    // --- load holidays and render ---
    function loadHolidays() {
        fetch(`https://date.nager.at/api/v3/PublicHolidays/${year}/PL`)
            .then(res => res.json())
            .then(data => {
                holidays = {};
                data.forEach(h => holidays[h.date] = h.localName);
                render();
            })
            .catch(() => render());
    }

    function render() {
        calendar.innerHTML = "";

        months.forEach((monthName, monthIndex) => {
            const container = document.createElement("div");
            container.className = "month";

            const name = document.createElement("div");
            name.className = "month-name";
            name.textContent = monthName;

            const grid = document.createElement("div");
            grid.className = "month-grid";

            const weekdaysRow = document.createElement("div");
            weekdaysRow.className = "weekdays-row";

            const daysRow = document.createElement("div");
            daysRow.className = "days-row";

            const daysInMonth = new Date(year, monthIndex + 1, 0).getDate();

            for (let day = 1; day <= daysInMonth; day++) {
                const date = new Date(year, monthIndex, day);
                const iso = isoDate(year, monthIndex, day);
                const isWeekend = date.getDay() === 0 || date.getDay() === 6;
                const isHoliday = holidays[iso];
                const wdIndex = getPolishWeekdayIndex(date.getDay());

                // weekday label above each day cell
                const wdCell = document.createElement("div");
                wdCell.className = "weekday-cell";
                wdCell.textContent = weekdaysShort[wdIndex];
                weekdaysRow.appendChild(wdCell);

                const cell = document.createElement("div");
                cell.className = "cell";
                cell.textContent = day;

                if (isWeekend) cell.classList.add("weekend");
                if (isHoliday) {
                    cell.classList.add("holiday");
                    cell.title = isHoliday;
                }
                if (selectedDays.has(iso)) cell.classList.add("selected");
                if (!isWeekend && !isHoliday) cell.classList.add("workday");

                cell.onclick = () => {
                    if (isWeekend || isHoliday) return;
                    if (selectedDays.has(iso)) {
                        selectedDays.delete(iso);
                    } else {
                        selectedDays.add(iso);
                    }
                    updateStats();
                    render();
                };

                daysRow.appendChild(cell);
            }

            grid.appendChild(weekdaysRow);
            grid.appendChild(daysRow);
            container.appendChild(name);
            container.appendChild(grid);
            calendar.appendChild(container);
        });

        updateStats();
    }

    // --- entry point ---
    loadFromUrl();
    yearLabel.textContent = year;
    loadHolidays();
</script>

</body>
</html>
